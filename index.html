<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Строитель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0c10;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 4rem 0 2rem;
            border-bottom: 1px solid #2a2e36;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #c0a56b;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8a8f99;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .card {
            background: #111418;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2e36;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #c0a56b;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #c0a56b;
        }

        .card p {
            color: #a0a6b0;
            margin-bottom: 1rem;
        }

        .tools {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tool-tag {
            background: #1e2329;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #b0b7c2;
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 2rem;
            color: #5f6a7a;
            font-size: 0.85rem;
            border-top: 1px solid #2a2e36;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 80vh;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .close {
            position: absolute;
            top: -40px;
            right: 0;
            font-size: 32px;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: bold;
        }

        .close:hover {
            color: #c0a56b;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            font-size: 32px;
            padding: 16px 24px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #c0a56b;
            color: #0a0c10;
        }

        .prev {
            left: -60px;
        }

        .next {
            right: -60px;
        }

        .caption {
            margin-top: 16px;
            color: #c0a56b;
            text-align: center;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            h1 {
                font-size: 2rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .prev {
                left: 10px;
            }
            .next {
                right: 10px;
            }
            .nav-btn {
                font-size: 24px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏗️ ReggiRi</h1>
            <div class="subtitle">Наёмный билдер</div>
        </header>

        <div class="grid">
            <!-- КАРТОЧКА 1 -->
            <div class="card" data-gallery='["images/mini-house/mini-house-1.png", "images/mini-house/mini-house-2.png", "images/mini-house/mini-house-3.png", "images/mini-house/mini-house-3.png", "images/mini-house/mini-house-2.png"]' data-title="Название работы 1">
                <img src="images/work1_1.jpg" alt="Превью работы 1">
                <div class="card-content">
                    <h3>Небольшой дом</h3>
                    <p>Загородный дом для двух человек</p>
                    <div class="tools">
                        <span class="tool-tag">Axiom</span>
                    </div>
                </div>
            </div>

            <!-- КАРТОЧКА 2 -->
            <div class="card" data-gallery='["images/work2_1.jpg", "images/work2_2.jpg"]' data-title="Название работы 2">
                <img src="images/work2_1.jpg" alt="Превью работы 2">
                <div class="card-content">
                    <h3>[Название работы 2]</h3>
                    <p>[Короткое описание]</p>
                    <div class="tools">
                        <span class="tool-tag">Little Tiles</span>
                    </div>
                </div>
            </div>

            <!-- КАРТОЧКА 3 -->
            <div class="card" data-gallery='["images/work3_1.jpg", "images/work3_2.jpg", "images/work3_3.jpg"]' data-title="Название работы 3">
                <img src="images/work3_1.jpg" alt="Превью работы 3">
                <div class="card-content">
                    <h3>[Название работы 3]</h3>
                    <p>[Короткое описание]</p>
                    <div class="tools">
                        <span class="tool-tag">Axiom</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            © 2026 ReggiRi | Портфолио строителя
        </footer>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close">&times;</button>
            <button class="nav-btn prev">❮</button>
            <img id="modal-img" src="" alt="">
            <button class="nav-btn next">❯</button>
            <div class="caption" id="modal-caption"></div>
        </div>
    </div>

    <script>
        let currentImages = [];
        let currentIndex = 0;
        let currentTitle = '';

        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalCaption = document.getElementById('modal-caption');
        const closeBtn = document.querySelector('.close');
        const prevBtn = document.querySelector('.prev');
        const nextBtn = document.querySelector('.next');

        function openGallery(images, title) {
            currentImages = images;
            currentTitle = title;
            currentIndex = 0;
            updateModal();
            modal.classList.add('active');
        }

        function updateModal() {
            if (currentImages.length > 0) {
                modalImg.src = currentImages[currentIndex];
                modalCaption.textContent = `${currentTitle} — ${currentIndex + 1} / ${currentImages.length}`;
            }
        }

        function nextImage() {
            if (currentImages.length > 0) {
                currentIndex = (currentIndex + 1) % currentImages.length;
                updateModal();
            }
        }

        function prevImage() {
            if (currentImages.length > 0) {
                currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
                updateModal();
            }
        }

        // Открытие галереи по клику на карточку
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const galleryAttr = card.getAttribute('data-gallery');
                const title = card.getAttribute('data-title') || '';
                if (galleryAttr) {
                    try {
                        const images = JSON.parse(galleryAttr);
                        if (images && images.length) {
                            openGallery(images, title);
                        }
                    } catch(e) {
                        console.error('Ошибка парсинга галереи', e);
                    }
                }
            });
        });

        // Закрытие по крестику
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Закрытие по клику вне картинки
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Стрелки клавиатуры
        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') {
                prevImage();
            } else if (e.key === 'ArrowRight') {
                nextImage();
            } else if (e.key === 'Escape') {
                modal.classList.remove('active');
            }
        });

        prevBtn.addEventListener('click', prevImage);
        nextBtn.addEventListener('click', nextImage);
    </script>
</body>
</html>
